<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Monto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Nawigacja */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid #e8e8e8;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: #1a1a1a;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #666666;
        }

        /* Sekcja */
        section {
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 80px auto 0;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        section.contact {
            background-color: #f9f9f9;
            text-align: center;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 700;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #1a1a1a;
            margin-top: 1rem;
            margin-left: auto;
            margin-right: auto;
        }

        /* Formularz */
        .contact-form {
            max-width: 600px;
            margin: 3rem auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-submit {
            width: 100%;
            padding: 1rem;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-submit:hover {
            background-color: #333333;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(26, 26, 26, 0.2);
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 1.5rem;
                font-size: 0.9rem;
            }

            section {
                padding: 4rem 1.5rem;
            }

            .footer-links {
                gap: 1rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 0.85rem;
            }

            section {
                margin-top: 60px;
            }
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Nawigacja -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Monto</a>
            <ul class="nav-links">
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="uslugi.html">Usługi</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact">
        <h2 class="section-title fade-in">Skontaktuj Się</h2>
        <div class="contact-form">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Imię i nazwisko</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Opis projektu</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="form-submit" id="submitBtn">Wyślij Zapytanie</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="portfolio.html">Portfolio</a>
                <a href="uslugi.html">Usługi</a>
                <a href="kontakt.html">Kontakt</a>
                <a href="https://www.instagram.com/alan.kolarzyk/">Instagram (Montaż)</a>
                <a href="https://www.instagram.com/zawieruchawojtek1/">Instagram (Montaż Oraz Strony)</a>
                <a href="https://www.youtube.com/@Wojtek_Zawierucha">YouTube</a>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Monto. Wszystkie prawa zastrzeżone.</p>
            </div>
        </div>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <script>
        // Inicjalizuj EmailJS
        emailjs.init("lpgOpULhyN-Ufo5g6");

        // Obsługa formularza EmailJS
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const button = document.getElementById('submitBtn');
            const originalText = button.textContent;
            button.textContent = 'Wysyłam...';
            button.disabled = true;

            // Wysyłanie emaila
            emailjs.sendForm(
                'service_ykl7we4',
                'template_rcwf8k4',
                this
            ).then(function(response) {
                console.log('Email wysłany!', response.status, response.text);
                button.textContent = 'Wysłano! ✓';
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                    document.getElementById('contactForm').reset();
                }, 3000);
            }, function(error) {
                console.log('Błąd:', error);
                button.textContent = 'Błąd! Spróbuj jeszcze raz';
                button.disabled = false;
                
                setTimeout(() => {
                    button.textContent = originalText;
                }, 3000);
            });
        });
    </script>
</body>
</html>
